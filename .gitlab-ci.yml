stages:
  - build
  - test
  - benchmark
  - docker

variables:
  MIX_ENV: test
  # Docker image settings
  DOCKER_IMAGE: ${CI_REGISTRY_IMAGE}
  DOCKER_BUILDKIT: 1

default:
  image: erlang:27
  before_script:
    - apt-get update && apt-get install -y cmake libsnappy-dev liblz4-dev libzstd-dev
    - rebar3 --version

cache:
  key: ${CI_COMMIT_REF_SLUG}-v2
  paths:
    - ${HOME}/.cache/rebar3/

# ============================================
# Build Stage
# ============================================

compile:
  stage: build
  script:
    - rebar3 compile
  artifacts:
    paths:
      - _build/
    expire_in: 1 hour

# ============================================
# Test Stage
# ============================================

eunit:
  stage: test
  needs:
    - compile
  script:
    - rebar3 eunit --module=barrel_vectordb_tests
    - rebar3 eunit --module=barrel_vectordb_store_tests
    - rebar3 eunit --module=barrel_vectordb_hnsw_tests
    - rebar3 eunit --module=barrel_vectordb_embed_tests
    - rebar3 eunit --module=barrel_vectordb_embed_provider_tests
    - rebar3 eunit --module=barrel_vectordb_embed_ollama_tests
    - rebar3 eunit --module=barrel_vectordb_embed_openai_tests
    - rebar3 eunit --module=barrel_vectordb_embed_local_tests
    - rebar3 eunit --module=barrel_vectordb_comprehensive_tests

dialyzer:
  stage: test
  needs:
    - compile
  script:
    - rebar3 dialyzer
  allow_failure: true
  cache:
    key: dialyzer-${CI_COMMIT_REF_SLUG}-v2
    paths:
      - ${HOME}/.cache/rebar3/

cover:
  stage: test
  needs:
    - compile
  script:
    - rebar3 cover --verbose
  coverage: '/Total\s+\|\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    paths:
      - _build/test/cover/
    expire_in: 1 week

# ============================================
# Benchmark Stage
# ============================================

benchmark:
  stage: benchmark
  needs:
    - compile
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual
  variables:
    BENCH_ITERATIONS: "50"
    BENCH_WARMUP: "10"
  script:
    - rebar3 as bench compile
    - |
      erl -pa _build/bench/lib/*/ebin \
          -pa _build/bench/lib/*/bench \
          -pa _build/default/lib/*/ebin \
          -noshell \
          -eval "
      application:ensure_all_started(barrel_vectordb),
      barrel_vectordb_bench:run_all(#{
          iterations => ${BENCH_ITERATIONS},
          warmup_iterations => ${BENCH_WARMUP},
          output_format => all
      }),
      halt().
      "
  artifacts:
    paths:
      - bench_results.json
      - bench_results.csv
    expire_in: 30 days

benchmark_compare:
  stage: benchmark
  needs:
    - benchmark
  rules:
    - if: $BASELINE_JOB_ID
      when: manual
  script:
    - |
      if [ -n "$BASELINE_JOB_ID" ]; then
        curl --output baseline.json "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${BASELINE_JOB_ID}/artifacts/bench_results.json"
        erl -pa _build/bench/lib/*/ebin \
            -pa _build/bench/lib/*/bench \
            -pa _build/default/lib/*/ebin \
            -noshell \
            -eval "barrel_vectordb_bench_compare:compare(\"baseline.json\", \"bench_results.json\"), halt()."
      fi
  allow_failure: true

# ============================================
# Docker Build Stage
# ============================================

.docker_build_template: &docker_build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - |
      # Install buildx for multi-arch support
      mkdir -p ~/.docker/cli-plugins
      BUILDX_VERSION=v0.12.1
      wget -qO ~/.docker/cli-plugins/docker-buildx \
        "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64"
      chmod +x ~/.docker/cli-plugins/docker-buildx
      docker buildx create --use --name multiarch --driver docker-container
      docker buildx inspect --bootstrap

# Build and push Docker image for tagged releases
docker:release:
  <<: *docker_build
  stage: docker
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      # Extract version from tag (remove 'v' prefix if present)
      VERSION=${CI_COMMIT_TAG#v}
      BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

      echo "Building Docker image version: ${VERSION}"
      echo "Platforms: linux/amd64, linux/arm64"

      # Build and push multi-arch image
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg CI_JOB_TOKEN=${CI_JOB_TOKEN} \
        --build-arg BUILD_DATE=${BUILD_DATE} \
        --build-arg VCS_REF=${CI_COMMIT_SHA} \
        --build-arg VERSION=${VERSION} \
        --tag ${DOCKER_IMAGE}:${VERSION} \
        --tag ${DOCKER_IMAGE}:latest \
        --push \
        .

# Build and push Docker image for main branch
docker:main:
  <<: *docker_build
  stage: docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - |
      BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      SHORT_SHA=${CI_COMMIT_SHORT_SHA}

      echo "Building Docker image for main branch"
      echo "Platforms: linux/amd64, linux/arm64"

      # Build and push multi-arch image
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg CI_JOB_TOKEN=${CI_JOB_TOKEN} \
        --build-arg BUILD_DATE=${BUILD_DATE} \
        --build-arg VCS_REF=${CI_COMMIT_SHA} \
        --build-arg VERSION=main-${SHORT_SHA} \
        --tag ${DOCKER_IMAGE}:main \
        --tag ${DOCKER_IMAGE}:main-${SHORT_SHA} \
        --push \
        .

# Build Docker image for branches (manual, single arch for speed)
docker:branch:
  <<: *docker_build
  stage: docker
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != "main"
      when: manual
  script:
    - |
      BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      # Sanitize branch name for Docker tag
      BRANCH_TAG=$(echo ${CI_COMMIT_REF_SLUG} | sed 's/[^a-zA-Z0-9_.-]/-/g')

      echo "Building Docker image for branch: ${CI_COMMIT_BRANCH}"
      echo "Platform: linux/amd64 only (use tagged release for multi-arch)"

      # Build single arch for speed on feature branches
      docker buildx build \
        --platform linux/amd64 \
        --build-arg CI_JOB_TOKEN=${CI_JOB_TOKEN} \
        --build-arg BUILD_DATE=${BUILD_DATE} \
        --build-arg VCS_REF=${CI_COMMIT_SHA} \
        --build-arg VERSION=${BRANCH_TAG} \
        --tag ${DOCKER_IMAGE}:${BRANCH_TAG} \
        --push \
        .

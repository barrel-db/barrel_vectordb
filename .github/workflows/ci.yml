name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y cmake libsnappy-dev liblz4-dev libzstd-dev

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ hashFiles('rebar.lock') }}

      - name: Compile
        run: rebar3 compile

      - name: Run EUnit tests
        run: |
          rebar3 eunit --module=barrel_vectordb_tests
          rebar3 eunit --module=barrel_vectordb_store_tests
          rebar3 eunit --module=barrel_vectordb_hnsw_tests
          rebar3 eunit --module=barrel_vectordb_comprehensive_tests

      - name: Coverage
        run: rebar3 cover --verbose

  dialyzer:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y cmake libsnappy-dev liblz4-dev libzstd-dev

      - name: Cache PLT
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: dialyzer-${{ hashFiles('rebar.lock') }}

      - name: Dialyzer
        run: rebar3 dialyzer
